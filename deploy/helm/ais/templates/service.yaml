apiVersion: v1
kind: Service
metadata:
  name: {{ include "ais.fullname" . }}-api
  labels:
    app.kubernetes.io/component: api
    {{- include "ais.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.api.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/component: api
    {{- include "ais.selectorLabels" . | nindent 4 }}
