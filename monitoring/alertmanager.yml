# AIS Alertmanager Configuration
#
# Routes alerts from the AIS AlertDispatcher (alertmanager channel format)
# to configured receivers based on severity labels.
#
# Override webhook URLs via environment variables or edit this file directly
# for production deployments.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 5m

    - match:
        severity: high
      receiver: 'high'
      repeat_interval: 15m

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://ais-api:8000/webhooks/alertmanager'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://ais-api:8000/webhooks/alertmanager'
        send_resolved: true

  - name: 'high'
    webhook_configs:
      - url: 'http://ais-api:8000/webhooks/alertmanager'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'symbol']
